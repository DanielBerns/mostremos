<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reportes Ciudadanos</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />

    <style>
        body { font-family: system-ui, -apple-system, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        .card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .btn { display: block; width: 100%; padding: 12px; background: #007bff; color: white; text-align: center; border: none; border-radius: 4px; font-size: 16px; margin-top: 20px; }
        #location-status { font-size: 0.9em; color: #666; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h2 class="text-center mb-4">Mostremos - Reporte Ciudadano</h2>

<div id="login-section" class="card p-4 shadow-sm" style="display: none; max-width: 400px; margin: 0 auto;">
            <h4 class="text-center mb-3">Iniciar Sesión</h4>
            <form id="login-form">
                <div class="mb-3">
                    <label for="username" class="form-label">Usuario (Email)</label>
                    <input type="email" class="form-control" id="username" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="password" required>
                </div>
                <button type="submit" id="login-btn" class="btn btn-primary w-100">Ingresar</button>
                <div id="login-error" class="text-danger mt-2 text-center" style="display: none;"></div>
            </form>
            <div class="text-center mt-3">
                <a href="#" id="show-register" class="text-decoration-none">¿No tienes cuenta? Regístrate aquí</a>
            </div>
        </div>

        <div id="register-section" class="card p-4 shadow-sm" style="display: none; max-width: 400px; margin: 0 auto;">
            <h4 class="text-center mb-3">Crear Cuenta</h4>
            <form id="register-form">
                <div class="mb-3">
                    <label for="reg-username" class="form-label">Usuario (Email)</label>
                    <input type="email" class="form-control" id="reg-username" required>
                </div>
                <div class="mb-3">
                    <label for="reg-password" class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="reg-password" required minlength="6">
                </div>
                <button type="submit" id="register-btn" class="btn btn-success w-100">Registrarse</button>
                <div id="register-error" class="text-danger mt-2 text-center" style="display: none;"></div>
            </form>
            <div class="text-center mt-3">
                <a href="#" id="show-login" class="text-decoration-none">¿Ya tienes cuenta? Inicia sesión</a>
            </div>
        </div>

        <div id="reporting-section" style="display: none;">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <span id="user-greeting" class="text-muted"></span>
                <button id="logout-btn" class="btn btn-sm btn-outline-danger">Cerrar Sesión</button>
            </div>

            <form id="submission-form" class="card p-3 shadow-sm">
                <button type="submit" id="submit-btn" class="btn btn-success w-100 mt-3" disabled>
                    Enviar Reporte
                </button>
            </form>
            </div>

    </div>

    </body>
</html>
