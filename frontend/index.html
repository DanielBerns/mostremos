<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reportes Ciudadanos</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />

    <style>
        body { font-family: system-ui, -apple-system, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        .card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .btn { display: block; width: 100%; padding: 12px; background: #007bff; color: white; text-align: center; border: none; border-radius: 4px; font-size: 16px; margin-top: 20px; }
        #location-status { font-size: 0.9em; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

    <h2>Nuevo Reporte</h2>

    <form id="submission-form">
        <div class="mb-3">
            <label class="form-label">Evidencia Fotográfica</label>

            <button type="button" id="btn-start-camera" class="btn btn-outline-primary w-100 mb-2">
                📸 Usar Cámara Integrada
            </button>

            <div id="camera-container" style="display: none; flex-direction: column; align-items: center; margin-bottom: 15px;">
                <video id="camera-feed" autoplay playsinline style="width: 100%; max-width: 400px; border-radius: 8px; background-color: #000;"></video>

                <canvas id="camera-canvas" style="display: none;"></canvas>

                <img id="photo-preview" style="display: none; width: 100%; max-width: 400px; border-radius: 8px; margin-top: 10px;" />

                <div style="margin-top: 10px; width: 100%; display: flex; justify-content: space-between;">
                    <button type="button" id="btn-capture" class="btn btn-primary w-100">Tomar Foto</button>
                    <button type="button" id="btn-retake" class="btn btn-secondary w-100" style="display: none;">Volver a tomar</button>
                </div>
            </div>

            <div id="fallback-upload">
                <label for="photo-input" style="font-size: 0.9em; color: #666;">O subir desde galería:</label>
                <input type="file" id="photo-input" accept="image/*" class="form-control">
            </div>
        </div>
        <div class="card">
            <strong>2. Ubicación</strong>
            <div id="location-status">📍 Obteniendo coordenadas...</div>
            <input type="hidden" id="lat" name="lat">
            <input type="hidden" id="lon" name="lon">
        </div>

        <div class="card">
            <label for="tag-select"><strong>3. Categoría</strong></label>
            <select id="tag-select" name="tag_id" required>
                <option value="">Seleccione una categoría...</option>
                </select>
        </div>

        <div class="card">
            <label for="notes"><strong>4. Notas Adicionales</strong></label>
            <textarea id="notes" style="width:100%; margin-top:10px;" rows="3"></textarea>
        </div>

        <button type="submit" class="btn" id="submit-btn" disabled>Guardar Reporte</button>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>

    <script src="js/app.js"></script>
</body>
</html>
