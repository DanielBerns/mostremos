<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reportes Ciudadanos</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />

    <style>
        body { font-family: system-ui, -apple-system, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        .card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .btn { display: block; width: 100%; padding: 12px; background: #007bff; color: white; text-align: center; border: none; border-radius: 4px; font-size: 16px; margin-top: 20px; cursor: pointer; }
        .btn-success { background: #28a745; }
        .btn-outline-danger { background: transparent; color: #dc3545; border: 1px solid #dc3545; padding: 5px 10px; font-size: 12px; width: auto; margin: 0; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        #location-status { font-size: 0.9em; color: #666; margin-bottom: 15px; text-align: center; }
        .camera-box { position: relative; width: 100%; max-width: 400px; margin: 0 auto; display: none; flex-direction: column; align-items: center; }
        video, img, canvas { width: 100%; border-radius: 8px; background: #000; }
        .controls { display: flex; gap: 10px; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h2 class="text-center mb-4">Mostremos - Reporte Ciudadano</h2>

        <div id="login-section" class="card p-4 shadow-sm" style="display: none; max-width: 400px; margin: 0 auto;">
            <h4 class="text-center mb-3">Iniciar Sesión</h4>
            <form id="login-form">
                <div class="mb-3">
                    <label for="username" class="form-label" style="display:block; margin-bottom:5px;">Usuario (Email)</label>
                    <input type="email" class="form-control" id="username" style="width:100%; padding:8px; margin-bottom:15px; box-sizing:border-box;" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label" style="display:block; margin-bottom:5px;">Contraseña</label>
                    <input type="password" class="form-control" id="password" style="width:100%; padding:8px; margin-bottom:15px; box-sizing:border-box;" required>
                </div>
                <button type="submit" id="login-btn" class="btn btn-primary w-100">Ingresar</button>
                <div id="login-error" class="text-danger mt-2 text-center" style="display: none; color: red; margin-top: 10px;"></div>
            </form>
            <div class="text-center mt-3" style="text-align: center; margin-top: 15px;">
                <a href="#" id="show-register" class="text-decoration-none" style="color: #007bff;">¿No tienes cuenta? Regístrate aquí</a>
            </div>
        </div>

        <div id="register-section" class="card p-4 shadow-sm" style="display: none; max-width: 400px; margin: 0 auto;">
            <h4 class="text-center mb-3">Crear Cuenta</h4>
            <form id="register-form">
                <div class="mb-3">
                    <label for="reg-username" class="form-label" style="display:block; margin-bottom:5px;">Usuario (Email)</label>
                    <input type="email" class="form-control" id="reg-username" style="width:100%; padding:8px; margin-bottom:15px; box-sizing:border-box;" required>
                </div>
                <div class="mb-3">
                    <label for="reg-password" class="form-label" style="display:block; margin-bottom:5px;">Contraseña</label>
                    <input type="password" class="form-control" id="reg-password" style="width:100%; padding:8px; margin-bottom:15px; box-sizing:border-box;" required minlength="6">
                </div>
                <button type="submit" id="register-btn" class="btn btn-success w-100">Registrarse</button>
                <div id="register-error" class="text-danger mt-2 text-center" style="display: none; color: red; margin-top: 10px;"></div>
            </form>
            <div class="text-center mt-3" style="text-align: center; margin-top: 15px;">
                <a href="#" id="show-login" class="text-decoration-none" style="color: #007bff;">¿Ya tienes cuenta? Inicia sesión</a>
            </div>
        </div>

        <div id="reporting-section" style="display: none;">
            <div class="d-flex justify-content-between align-items-center mb-3" style="display: flex; justify-content: flex-end; margin-bottom: 15px;">
                <button id="logout-btn" class="btn btn-sm btn-outline-danger">Cerrar Sesión</button>
            </div>

            <form id="submission-form" class="card p-3 shadow-sm">

                <div id="location-status">Ubicando dispositivo...</div>
                <input type="hidden" id="lat">
                <input type="hidden" id="lon">

                <div style="margin-bottom: 15px;">
                    <label for="tag-select" style="display:block; margin-bottom:5px;">Categoría del Reporte:</label>
                    <select id="tag-select" required></select>
                </div>

                <div style="margin-bottom: 15px; text-align: center;">
                    <button type="button" id="btn-start-camera" class="btn" style="background-color: #6c757d;">📸 Tomar Foto (Opcional)</button>

                    <div id="camera-container" class="camera-box">
                        <video id="camera-feed" autoplay playsinline></video>
                        <canvas id="camera-canvas" style="display: none;"></canvas>
                        <img id="photo-preview" style="display: none;" />

                        <div class="controls">
                            <button type="button" id="btn-capture" class="btn btn-success">Capturar</button>
                            <button type="button" id="btn-retake" class="btn" style="display: none; background-color: #ffc107; color: black;">Reintentar</button>
                        </div>
                    </div>
                </div>

                <div style="margin-bottom: 15px;">
                    <label for="notes" style="display:block; margin-bottom:5px;">Notas / Descripción:</label>
                    <textarea id="notes" class="form-control" rows="3" style="width: 100%; box-sizing: border-box; padding: 8px;"></textarea>
                </div>

                <button type="submit" id="submit-btn" class="btn btn-success w-100 mt-3" disabled>
                    Enviar Reporte
                </button>
            </form>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
    <script src="js/categories.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
