<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reportes Ciudadanos</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />

    <style>
        body { font-family: system-ui, -apple-system, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        .card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .btn { display: block; width: 100%; padding: 12px; background: #007bff; color: white; text-align: center; border: none; border-radius: 4px; font-size: 16px; margin-top: 20px; }
        #location-status { font-size: 0.9em; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

    <h2>Nuevo Reporte</h2>

    <form id="submission-form">
        <div class="card">
            <label for="photo-input"><strong>1. Tomar Foto</strong></label>
            <input type="file" id="photo-input" accept="image/*" capture="environment" style="margin-top:10px; width:100%;">
        </div>

        <div class="card">
            <strong>2. Ubicación</strong>
            <div id="location-status">📍 Obteniendo coordenadas...</div>
            <input type="hidden" id="lat" name="lat">
            <input type="hidden" id="lon" name="lon">
        </div>

        <div class="card">
            <label for="tag-select"><strong>3. Categoría</strong></label>
            <select id="tag-select" name="tag_id" required>
                <option value="">Seleccione una categoría...</option>
                </select>
        </div>

        <div class="card">
            <label for="notes"><strong>4. Notas Adicionales</strong></label>
            <textarea id="notes" style="width:100%; margin-top:10px;" rows="3"></textarea>
        </div>

        <button type="submit" class="btn" id="submit-btn" disabled>Guardar Reporte</button>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>

    <script src="js/app.js"></script>
</body>
</html>
