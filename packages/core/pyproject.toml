[project]
name = "core"
version = "0.1.0"
description = "Core domain models, ports, and business logic for the crowdsource platform"
requires-python = ">=3.14"

# The core domain must remain pure and infrastructure-agnostic.
# DO NOT add frameworks, ORMs, or web servers to this list.
dependencies = []

[build-system]
requires = ["uv_build>=0.10.2,<0.11.0"]
build-backend = "uv_build"
