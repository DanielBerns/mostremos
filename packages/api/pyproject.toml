[project]
name = "api"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
    "core",
    "infra",
    "flask>=3.0.0",
    "marshmallow>=3.20.0",
    "werkzeug>=3.0.0",
    "flask-cors>=6.0.2",
]

[tool.uv.sources]
core = { workspace = true }
infra = { workspace = true }

[build-system]
requires = ["uv_build>=0.10.2,<0.11.0"]
build-backend = "uv_build"
